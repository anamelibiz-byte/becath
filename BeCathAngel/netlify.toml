# ═══════════════════════════════════════════════════
# netlify.toml — Catholic Daily App
# Place this file at the root of your GitHub repo
# ═══════════════════════════════════════════════════

[build]
  publish = "."                  # single HTML file at root
  # If using Vite: publish = "dist"
  # command = "npm run build"    # uncomment if using a build step

# SPA: all routes → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

# Service worker — no cache (must always be fresh)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# Static assets — long cache
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables (set in Netlify UI, not here for security)
# VITE_SUPABASE_URL
# VITE_SUPABASE_ANON_KEY
# STRIPE_PUBLISHABLE_KEY
