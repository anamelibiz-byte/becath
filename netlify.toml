# Netlify config for becath.com
# Drag the entire `site/` folder onto Netlify's deploy zone, OR connect via GitHub.

[build]
  publish = "."

# Make /app and /app/ both serve the app's index.html cleanly
[[redirects]]
  from = "/app"
  to = "/app/"
  status = 301
  force = true

# Cache static images aggressively
[[headers]]
  for = "/app/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML — always serve fresh
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/app/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
